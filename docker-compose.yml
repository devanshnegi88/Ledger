version: "3.9"

services:
  db:
    image: postgres:15
    container_name: ledger_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ledger_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_prod}
      POSTGRES_DB: ${POSTGRES_DB:-ledger_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ledger_admin}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ledger_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: ledger_app
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    command: >
      sh -c "alembic upgrade head &&
             python scripts/seed.py &&
             uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"

  tests:
    build: .
    container_name: ledger_tests
    profiles: ["test"]
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./:/app
    command: ["pytest", "--cov=src", "--cov-report=term-missing", "-v"]

volumes:
  pgdata:
