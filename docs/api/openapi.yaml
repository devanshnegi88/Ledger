components:
  schemas:
    AccountClosureSweepRequest:
      properties:
        customer_account_code:
          type: string
          title: Customer Account Code
        currency:
          type: string
          maxLength: 3
          minLength: 3
          title: Currency
          default: INR
        idempotency_key:
          type: string
          maxLength: 128
          minLength: 8
          title: Idempotency Key
        created_by:
          type: string
          title: Created By
        narrative:
          anyOf:
          - type: string
          - type: 'null'
          title: Narrative
          default: Account closure sweep
      type: object
      required:
      - customer_account_code
      - idempotency_key
      - created_by
      title: AccountClosureSweepRequest
    BillPaymentRequest:
      properties:
        customer_account_code:
          type: string
          title: Customer Account Code
        biller_code:
          type: string
          title: Biller Code
        amount:
          anyOf:
          - type: number
            exclusiveMinimum: 0.0
          - type: string
            pattern: ^(?!^[-+.]*$)[+-]?0*\d*\.?\d*$
          title: Amount
        convenience_fee:
          anyOf:
          - type: number
            minimum: 0.0
          - type: string
            pattern: ^(?!^[-+.]*$)[+-]?0*\d*\.?\d*$
          title: Convenience Fee
          default: '0'
        currency:
          type: string
          maxLength: 3
          minLength: 3
          title: Currency
          default: INR
        idempotency_key:
          type: string
          maxLength: 128
          minLength: 8
          title: Idempotency Key
        created_by:
          type: string
          title: Created By
        narrative:
          anyOf:
          - type: string
          - type: 'null'
          title: Narrative
          default: Bill payment
      type: object
      required:
      - customer_account_code
      - biller_code
      - amount
      - idempotency_key
      - created_by
      title: BillPaymentRequest
    CashbackCreditRequest:
      properties:
        customer_account_code:
          type: string
          title: Customer Account Code
        amount:
          anyOf:
          - type: number
            exclusiveMinimum: 0.0
          - type: string
            pattern: ^(?!^[-+.]*$)[+-]?0*\d*\.?\d*$
          title: Amount
        campaign_code:
          type: string
          title: Campaign Code
        currency:
          type: string
          maxLength: 3
          minLength: 3
          title: Currency
          default: INR
        idempotency_key:
          type: string
          maxLength: 128
          minLength: 8
          title: Idempotency Key
        created_by:
          type: string
          title: Created By
        narrative:
          anyOf:
          - type: string
          - type: 'null'
          title: Narrative
          default: Cashback credit
      type: object
      required:
      - customer_account_code
      - amount
      - campaign_code
      - idempotency_key
      - created_by
      title: CashbackCreditRequest
    ChargebackRequest:
      properties:
        customer_account_code:
          type: string
          title: Customer Account Code
        merchant_code:
          type: string
          title: Merchant Code
        amount:
          anyOf:
          - type: number
            exclusiveMinimum: 0.0
          - type: string
            pattern: ^(?!^[-+.]*$)[+-]?0*\d*\.?\d*$
          title: Amount
        chargeback_fee:
          anyOf:
          - type: number
            minimum: 0.0
          - type: string
            pattern: ^(?!^[-+.]*$)[+-]?0*\d*\.?\d*$
          title: Chargeback Fee
          default: '0'
        network_dispute_code:
          type: string
          title: Network Dispute Code
        currency:
          type: string
          maxLength: 3
          minLength: 3
          title: Currency
          default: INR
        idempotency_key:
          type: string
          maxLength: 128
          minLength: 8
          title: Idempotency Key
        created_by:
          type: string
          title: Created By
        narrative:
          anyOf:
          - type: string
          - type: 'null'
          title: Narrative
          default: Chargeback
      type: object
      required:
      - customer_account_code
      - merchant_code
      - amount
      - network_dispute_code
      - idempotency_key
      - created_by
      title: ChargebackRequest
    DepositBankRequest:
      properties:
        account_code:
          type: string
          title: Account Code
        amount:
          anyOf:
          - type: number
            exclusiveMinimum: 0.0
          - type: string
            pattern: ^(?!^[-+.]*$)[+-]?0*\d*\.?\d*$
          title: Amount
        currency:
          type: string
          maxLength: 3
          minLength: 3
          title: Currency
          default: INR
        idempotency_key:
          type: string
          maxLength: 128
          minLength: 8
          title: Idempotency Key
        created_by:
          type: string
          title: Created By
        narrative:
          anyOf:
          - type: string
          - type: 'null'
          title: Narrative
          default: Customer deposit via bank transfer
      type: object
      required:
      - account_code
      - amount
      - idempotency_key
      - created_by
      title: DepositBankRequest
    DepositCardRequest:
      properties:
        account_code:
          type: string
          title: Account Code
        amount:
          anyOf:
          - type: number
            exclusiveMinimum: 0.0
          - type: string
            pattern: ^(?!^[-+.]*$)[+-]?0*\d*\.?\d*$
          title: Amount
        gateway_fee:
          anyOf:
          - type: number
            minimum: 0.0
          - type: string
            pattern: ^(?!^[-+.]*$)[+-]?0*\d*\.?\d*$
          title: Gateway Fee
          default: '0'
        card_auth_token:
          type: string
          title: Card Auth Token
        currency:
          type: string
          maxLength: 3
          minLength: 3
          title: Currency
          default: INR
        idempotency_key:
          type: string
          maxLength: 128
          minLength: 8
          title: Idempotency Key
        created_by:
          type: string
          title: Created By
        narrative:
          anyOf:
          - type: string
          - type: 'null'
          title: Narrative
          default: Customer deposit via card
      type: object
      required:
      - account_code
      - amount
      - card_auth_token
      - idempotency_key
      - created_by
      title: DepositCardRequest
    FXConversionRequest:
      properties:
        customer_account_code:
          type: string
          title: Customer Account Code
        source_currency:
          type: string
          maxLength: 3
          minLength: 3
          title: Source Currency
        target_currency:
          type: string
          maxLength: 3
          minLength: 3
          title: Target Currency
        source_amount:
          anyOf:
          - type: number
            exclusiveMinimum: 0.0
          - type: string
            pattern: ^(?!^[-+.]*$)[+-]?0*\d*\.?\d*$
          title: Source Amount
        fx_markup_bps:
          type: integer
          minimum: 0.0
          title: Fx Markup Bps
          description: FX markup in basis points (50 = 0.5%)
          default: 50
        idempotency_key:
          type: string
          maxLength: 128
          minLength: 8
          title: Idempotency Key
        created_by:
          type: string
          title: Created By
        narrative:
          anyOf:
          - type: string
          - type: 'null'
          title: Narrative
          default: FX conversion
      type: object
      required:
      - customer_account_code
      - source_currency
      - target_currency
      - source_amount
      - idempotency_key
      - created_by
      title: FXConversionRequest
    FeeDeductionRequest:
      properties:
        account_code:
          type: string
          title: Account Code
        fee_amount:
          anyOf:
          - type: number
            exclusiveMinimum: 0.0
          - type: string
            pattern: ^(?!^[-+.]*$)[+-]?0*\d*\.?\d*$
          title: Fee Amount
